version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyplatform-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - SPRING_PROFILES_ACTIVE=prod
      # Nhập cấu hình database Supabase của bạn tại đây khi deploy
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-postgres.saeieulilltuqqkqrcoy}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      # Nhập cấu hình Supabase Storage khi deploy
      - SUPABASE_URL=${SUPABASE_URL:-https://saeieulilltuqqkqrcoy.supabase.co}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_BUCKET_NAME=${SUPABASE_BUCKET_NAME:-documents}
      # Cấu hình AI Gemini API khi deploy
      - AI_API_KEY=${AI_API_KEY}
      - AI_API_URL=${AI_API_URL:-https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}
      - AI_MODEL=${AI_MODEL:-gemini-flash-latest}
    restart: unless-stopped
