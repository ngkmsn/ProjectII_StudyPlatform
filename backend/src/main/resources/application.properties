# Server configuration
server.port=${PORT:8080}

# Database configuration (Supabase PostgreSQL via Session Pooler - IPv4 compatible)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.saeieulilltuqqkqrcoy}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:YOUR_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Supabase Storage configuration
supabase.url=${SUPABASE_URL:https://saeieulilltuqqkqrcoy.supabase.co}
supabase.service.role.key=${SUPABASE_SERVICE_ROLE_KEY:YOUR_SUPABASE_SERVICE_ROLE_KEY}
supabase.bucket.name=${SUPABASE_BUCKET_NAME:documents}

# AI Configuration (Google Gemini)
ai.api.key=${AI_API_KEY:YOUR_GEMINI_API_KEY}
ai.api.url=${AI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}
ai.model=${AI_MODEL:gemini-flash-latest}

# File Upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Activate local profile by default, but allow overriding (e.g. to prod) in server deployment
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-very-secure-and-long-secret-key-for-jwt-generation-here}

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}


