# Server configuration
server.port=8080

# Database configuration (Supabase PostgreSQL via Session Pooler - IPv4 compatible)
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.saeieulilltuqqkqrcoy
spring.datasource.password=YOUR_DATABASE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Supabase Storage configuration
supabase.url=https://saeieulilltuqqkqrcoy.supabase.co
supabase.service.role.key=YOUR_SUPABASE_SERVICE_ROLE_KEY
supabase.bucket.name=documents

# AI Configuration (Google Gemini)
ai.api.key=YOUR_GEMINI_API_KEY
ai.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
ai.model=gemini-flash-latest

# File Upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Activate local profile by default
spring.profiles.active=local

